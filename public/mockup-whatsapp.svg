<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 620" role="img" aria-labelledby="title desc">
  <title id="title">WhatsApp otomatik cevap önizlemesi</title>
  <desc id="desc">Müşterinin WhatsApp mesajına Cevaplai'nin önceden verilen bilgilerle otomatik yazdığı cevap</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7f7ec"/>
      <stop offset="1" stop-color="#d4f1de"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#10b981" fill-opacity="0.06"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="480" height="620" rx="32" fill="url(#bg)"/>

  <!-- phone frame -->
  <rect x="60" y="40" width="360" height="540" rx="36" fill="#ffffff" filter="url(#shadow)"/>

  <!-- WhatsApp header -->
  <rect x="60" y="40" width="360" height="56" rx="36" fill="#075e54"/>
  <rect x="60" y="72" width="360" height="24" fill="#075e54"/>
  <circle cx="92" cy="68" r="14" fill="#bfe8d6"/>
  <text x="92" y="73" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#075e54">E</text>
  <text x="116" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Esra · Müşteri</text>
  <text x="116" y="89" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfe8d6">son görülme bugün 14:30</text>

  <!-- chat area background -->
  <rect x="60" y="96" width="360" height="424" fill="#ece5dd"/>
  <rect x="60" y="96" width="360" height="424" fill="url(#dots)"/>

  <!-- incoming bubble (customer asks) -->
  <g transform="translate(80,116)">
    <path d="M 0,12 Q 0,0 12,0 H 250 Q 262,0 262,12 V 78 Q 262,90 250,90 H 16 L 6,100 L 8,90 H 0 Z" fill="#ffffff"/>
    <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">Merhaba, dün verdiğim sipariş</text>
    <text x="14" y="44" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">ne durumda? Kargoya verildi mi?</text>
    <text x="14" y="62" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">Sipariş no: #4821</text>
    <text x="244" y="84" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9aa6c1">14:31</text>
  </g>

  <!-- outgoing bubble (Cevaplai auto-reply) -->
  <g transform="translate(140,228)">
    <path d="M 0,12 Q 0,0 12,0 H 250 Q 262,0 262,12 V 130 Q 262,142 250,142 H 256 L 268,152 L 262,142 H 12 Q 0,142 0,130 Z" fill="#dcf8c6"/>
    <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">Merhaba Esra Hanım,</text>
    <text x="14" y="48" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">#4821 numaralı siparişiniz bu</text>
    <text x="14" y="66" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">sabah kargoya verildi. Tahmini</text>
    <text x="14" y="84" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">teslim: yarın akşam.</text>
    <text x="14" y="106" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">Takip no: ARS123456789</text>
    <text x="14" y="128" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#0b1220">İyi günler dileriz 🌿</text>
    <text x="244" y="138" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#4b5876">14:31  ✓✓</text>
  </g>

  <!-- "Cevaplai · otomatik" pill -->
  <g transform="translate(80,392)">
    <rect width="170" height="26" rx="13" fill="#ffffff" stroke="#10b981" stroke-width="1"/>
    <circle cx="14" cy="13" r="4" fill="#10b981"/>
    <text x="26" y="17" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#047857">Cevaplai · otomatik cevap</text>
  </g>

  <text x="240" y="466" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5876">Sizin önceden verdiğiniz bilgilerle otomatik yanıtlandı</text>

  <!-- input bar -->
  <g transform="translate(60,520)">
    <rect width="360" height="60" fill="#f0f0f0"/>
    <rect x="14" y="14" width="280" height="32" rx="16" fill="#ffffff"/>
    <text x="30" y="34" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#9aa6c1">Mesaj yaz...</text>
    <circle cx="324" cy="30" r="18" fill="#25d366"/>
    <text x="324" y="35" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">›</text>
  </g>
</svg>
