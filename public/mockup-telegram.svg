<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 620" role="img" aria-labelledby="title desc">
  <title id="title">Telegram onay mesajı önizlemesi</title>
  <desc id="desc">Cevaplai botunun Telegram üzerinden gönderdiği e-posta taslağı ve onay butonları</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf5ff"/>
      <stop offset="1" stop-color="#dceffd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1220" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="480" height="620" rx="32" fill="url(#bg)"/>

  <!-- phone frame -->
  <rect x="60" y="40" width="360" height="540" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="60" y="40" width="360" height="56" rx="36" fill="#0e66d3"/>
  <rect x="60" y="72" width="360" height="24" fill="#0e66d3"/>
  <circle cx="92" cy="68" r="14" fill="#ffffff" opacity="0.95"/>
  <text x="116" y="74" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Cevaplai Bot</text>
  <text x="116" y="89" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#cfe2ff">çevrimiçi</text>

  <!-- incoming message bubble (the draft) -->
  <g transform="translate(80,120)">
    <rect width="280" height="200" rx="16" fill="#f1f5fb"/>
    <text x="16" y="28" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0e66d3">VIP · Ahmet Yılmaz</text>
    <text x="16" y="48" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#4b5876">Konu: Sözleşme revizyonu</text>
    <line x1="16" y1="58" x2="264" y2="58" stroke="#dbeafe" stroke-width="1"/>
    <text x="16" y="80" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">Merhaba Ahmet Bey,</text>
    <text x="16" y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">Sözleşmedeki düzenlemeyi inceledim.</text>
    <text x="16" y="118" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">3. madde için önerinizi uygun</text>
    <text x="16" y="136" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">buluyorum. Yarın imzalı kopyayı</text>
    <text x="16" y="154" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">paylaşabilirim.</text>
    <text x="16" y="180" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#0b1220">Saygılarımla.</text>
  </g>

  <!-- inline buttons -->
  <g transform="translate(80,340)" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
    <rect width="280" height="40" rx="10" fill="#10b981"/>
    <text x="140" y="25" text-anchor="middle" fill="#ffffff">✅  Gönder</text>
  </g>
  <g transform="translate(80,388)" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
    <rect width="135" height="40" rx="10" fill="#1a82f5"/>
    <text x="67" y="25" text-anchor="middle" fill="#ffffff">✏️  Düzelt</text>
  </g>
  <g transform="translate(225,388)" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600">
    <rect width="135" height="40" rx="10" fill="#eef1f7"/>
    <text x="67" y="25" text-anchor="middle" fill="#1f2a44">🗑️  Skip</text>
  </g>

  <!-- footer hint -->
  <text x="240" y="466" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7796">Onaylanan cevap SMTP üzerinden gönderilir</text>

  <!-- typing indicator -->
  <g transform="translate(80,500)">
    <rect width="120" height="32" rx="16" fill="#f1f5fb"/>
    <circle cx="32" cy="16" r="3" fill="#9aa6c1"/>
    <circle cx="46" cy="16" r="3" fill="#9aa6c1"/>
    <circle cx="60" cy="16" r="3" fill="#9aa6c1"/>
  </g>
</svg>
