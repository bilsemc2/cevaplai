[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Netlify's official Next.js plugin handles App Router, ISR, and image optimization.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Forms success URL must be a non-Next.js path so the App Router static
# handler doesn't swallow POSTs. After Netlify Forms processes the POST
# (data-netlify="true" + form-name field), it 303-redirects to
# /forms-success — served as a static HTML file (public/forms-success.html)
# that immediately bounces the browser to /thanks via meta refresh and JS.
#
# We deliberately do NOT use a netlify.toml redirect here: edge caching of
# the redirect response intercepts POSTs before the Forms handler can run.
